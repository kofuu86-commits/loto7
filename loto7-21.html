// ── 直近N回でfreq計算 ────────────────────────────────────────────
function buildFrequencyN(draws, n) {
  const target = n === 0 ? draws : draws.slice(0, n);
  const freq = {};
  for (let i = 1; i <= TOTAL_NUMBERS; i++) freq[i] = 0;
  target.forEach(d => d.numbers.forEach(num => { if (freq[num] !== undefined) freq[num]++; }));
  return freq;
}

// ── ペア出現頻度（連続出現パターン）────────────────────────────
function buildPairFrequency(draws, n) {
  const target = n === 0 ? draws : draws.slice(0, n);
  const pairs = {};
  target.forEach(d => {
    const nums = d.numbers;
    for (let i = 0; i < nums.length; i++)
      for (let j = i+1; j < nums.length; j++) {
        const key = `${nums[i]}-${nums[j]}`;
        pairs[key] = (pairs[key] || 0) + 1;
      }
  });
  return Object.entries(pairs).sort((a,b)=>b[1]-a[1]).slice(0,10)
    .map(([key,cnt]) => ({ pair: key.split("-").map(Number), count: cnt }));
}

function buildFrequency(draws) {
  const freq = {};
  for (let i = 1; i <= TOTAL_NUMBERS; i++) freq[i] = 0;
  draws.forEach(d => d.numbers.forEach(n => { if (freq[n] !== undefined) freq[n]++; }));
  return freq;
}
function weightedRandom(freq, exclude = [], bias = 0) {
  const pool = [];
  const maxF = Math.max(...Object.values(freq), 1);
  for (let n = 1; n <= TOTAL_NUMBERS; n++) {
    if (!exclude.includes(n)) {
      const base = Math.max(freq[n] || 0, 1);
      let w;
      if (bias > 0) {
        w = Math.max(1, Math.round(base * (1 + bias * 0.3)));
      } else if (bias < 0) {
        const inv = maxF - base + 1;
        w = Math.max(1, Math.round(inv * (1 + Math.abs(bias) * 0.3)));
      } else {
        w = base;
      }
      for (let j = 0; j < w; j++) pool.push(n);
    }
  }
  return pool[Math.floor(Math.random() * pool.length)];
}
function generateNumbers(freq, bias = 0) {
  const picked = [];
  while (picked.length < PICK_COUNT) picked.push(weightedRandom(freq, picked, bias));
  return picked.sort((a, b) => a - b);
}

// ── メインアプリ ─────────────────────────────────────────────────
function MainApp() {
  // localStorageに保存された追加データをREAL_DRAWSにマージして初期化
  const [draws, setDraws] = useState(() => {
    try {
      const saved = localStorage.getItem("loto7_extraDraws");
      if (!saved) return REAL_DRAWS;
      const extra = JSON.parse(saved);
      const merged = [...extra, ...REAL_DRAWS];
      // 重複除去してround降順
      const seen = new Set();
      return merged.filter(d => {
        if (seen.has(d.round)) return false;
        seen.add(d.round);
        return true;
      }).sort((a,b) => b.round - a.round);
    } catch { return REAL_DRAWS; }
  });

  // drawsが変わったとき、REAL_DRAWSにない追加分だけ保存
  useEffect(() => {
    const realRounds = new Set(REAL_DRAWS.map(d => d.round));
    const extra = draws.filter(d => !realRounds.has(d.round));
    localStorage.setItem("loto7_extraDraws", JSON.stringify(extra));
  }, [draws]);
  const [numbers, setNumbers] = useState([]);
  const [sets, setSets]       = useState([]);
  const [generating, setGen]  = useState(false);
  const [tab, setTab]         = useState("generate");
  const [animKey, setAnimKey] = useState(0);
  const [scan, setScan]       = useState(0);
  const [assistMode, setAssistMode] = useState(false);

  // 設定（localStorageから初期値を読み込む）
  const [settingOpen, setSettingOpen]         = useState(false);
  const [multiPredict, setMultiPredict]       = useState(() => JSON.parse(localStorage.getItem("loto7_multiPredict") ?? "false"));
  const [multiCount, setMultiCount]           = useState(() => JSON.parse(localStorage.getItem("loto7_multiCount") ?? "5"));
  const [assistEnabled, setAssistEnabled]     = useState(() => JSON.parse(localStorage.getItem("loto7_assistEnabled") ?? "true"));
  const [manualDbEnabled, setManualDbEnabled] = useState(() => JSON.parse(localStorage.getItem("loto7_manualDbEnabled") ?? "true"));
  // 新設定
  const [themeKey, setThemeKey]         = useState(() => localStorage.getItem("loto7_theme") ?? "cyber");
  const [hotBias, setHotBias]           = useState(() => JSON.parse(localStorage.getItem("loto7_hotBias") ?? "0"));
  const [recentMode, setRecentMode]     = useState(() => localStorage.getItem("loto7_recentMode") ?? "all");
  const [analysisPeriod, setAnalysisPeriod] = useState(() => localStorage.getItem("loto7_analysisPeriod") ?? "all");
  const [skipOpening, setSkipOpening]   = useState(() => JSON.parse(localStorage.getItem("loto7_skipOpening") ?? "false"));
  const [historyLimit, setHistoryLimit] = useState(() => JSON.parse(localStorage.getItem("loto7_historyLimit") ?? "5"));
  const [helpOpen, setHelpOpen] = useState(false);
  const helpRef = useRef(null);
  const helpContentRef = useRef(null);

  useEffect(() => {
    if (helpOpen) {
      // ヘッダー直下のコンテンツ先頭から表示
      setTimeout(() => {
        if (helpContentRef.current) {
          helpContentRef.current.scrollIntoView({ behavior:"instant" });
        }
        if (helpRef.current) {
          helpRef.current.scrollTop = 0;
        }
      }, 50);
    }
  }, [helpOpen]);

  useEffect(() => { localStorage.setItem("loto7_historyLimit", JSON.stringify(historyLimit)); }, [historyLimit]);

  const theme = THEMES[themeKey] || THEMES.cyber;

  // 設定変更時にlocalStorageへ保存
  useEffect(() => { localStorage.setItem("loto7_multiPredict", JSON.stringify(multiPredict)); }, [multiPredict]);
  useEffect(() => { localStorage.setItem("loto7_multiCount", JSON.stringify(multiCount)); }, [multiCount]);
  useEffect(() => { localStorage.setItem("loto7_assistEnabled", JSON.stringify(assistEnabled)); }, [assistEnabled]);
  useEffect(() => { localStorage.setItem("loto7_manualDbEnabled", JSON.stringify(manualDbEnabled)); }, [manualDbEnabled]);
  useEffect(() => { localStorage.setItem("loto7_theme", themeKey); }, [themeKey]);
  useEffect(() => { localStorage.setItem("loto7_hotBias", JSON.stringify(hotBias)); }, [hotBias]);
  useEffect(() => { localStorage.setItem("loto7_recentMode", recentMode); }, [recentMode]);
  useEffect(() => { localStorage.setItem("loto7_analysisPeriod", analysisPeriod); }, [analysisPeriod]);

  // 手動追加フォーム用
  const [newRound, setNewRound]   = useState("");
  const [newDate, setNewDate]     = useState("");
  const [newNums, setNewNums]     = useState(["","","","","","",""]);
  const [addMsg, setAddMsg]       = useState("");
  const [addErr, setAddErr]       = useState("");

  // drawsから都度freqを計算（直近モード・HOTバイアス対応）
  const recentN   = recentMode === "50" ? 50 : recentMode === "100" ? 100 : 0;
  const analysisN = analysisPeriod === "50" ? 50 : analysisPeriod === "100" ? 100 : 0;
  const freq        = buildFrequencyN(draws, recentN);
  const freqAnalysis = buildFrequencyN(draws, analysisN);
  const maxFreq   = Math.max(...Object.values(freqAnalysis));
  const latest    = draws[0];
  const hotNums   = Object.entries(freqAnalysis).sort((a,b)=>b[1]-a[1]).slice(0,7).map(([n])=>+n);
  const coldNums  = Object.entries(freqAnalysis).sort((a,b)=>a[1]-b[1]).slice(0,7).map(([n])=>+n);
  const topPairs  = buildPairFrequency(draws, analysisN);

  useEffect(() => {
    const id = setInterval(() => setScan(v=>(v+1)%100), 30);
    return () => clearInterval(id);
  }, []);

  function handleGenerate() {
    if (generating) return;
    const count = multiPredict ? multiCount : 1;
    setGen(true);
    setNumbers([]);
    setSets([]);

    const generateOneSet = (setIndex, accSets) => {
      let c = 0;
      // スロット演出: 100ms間隔×25回 = 約2.5秒かけてゆっくり
      const iv = setInterval(() => {
        setNumbers(generateNumbers(freq, hotBias));
        if (++c >= 25) {
          clearInterval(iv);
          const final = generateNumbers(freq, hotBias);
          setNumbers(final);
          setAnimKey(k => k + 1);
          const newSet = { nums: final, id: Date.now() + setIndex * 1000 };
          const nextSets = [...accSets, newSet];
          setSets(nextSets);

          if (setIndex + 1 < count) {
            // 確定番号を1.8秒見せてからクリア→次のスロットへ
            setTimeout(() => {
              setNumbers([]);
              setTimeout(() => generateOneSet(setIndex + 1, nextSets), 400);
            }, 1800);
          } else {
            // 全セット完了
            if (count === 1) {
              setSets(prev => [newSet, ...prev.slice(1)].slice(0, historyLimit));
            } else {
              setSets(nextSets.slice(0, historyLimit));
            }
            setGen(false);
          }
        }
      }, 100);
    };

    generateOneSet(0, []);
  }

  function handleAddDraw() {
    setAddMsg(""); setAddErr("");
    const round = parseInt(newRound);
    if (!round || round < 1) { setAddErr("回号を正しく入力してください"); return; }
    if (!newDate.match(/^\d{4}-\d{2}-\d{2}$/)) { setAddErr("日付をYYYY-MM-DD形式で入力してください"); return; }
    if (draws.some(d => d.round === round)) { setAddErr(`第${round}回はすでに登録済みです`); return; }
    const numbers = newNums.map(n => parseInt(n));
    if (numbers.some(n => isNaN(n) || n < 1 || n > 37)) { setAddErr("番号は1〜37の整数を入力してください"); return; }
    if (new Set(numbers).size !== 7) { setAddErr("7つの異なる番号を入力してください"); return; }
    const newDraw = { round, date: newDate, numbers: numbers.sort((a,b)=>a-b) };
    setDraws(prev => [newDraw, ...prev].sort((a,b)=>b.round-a.round));
    setAddMsg(`✓ 第${round}回（${newDate}）を追加しました！`);
    setNewRound(""); setNewDate(""); setNewNums(["","","","","","",""]);
  }

  return (
    <div style={{ minHeight:"100vh", background:"#050508", fontFamily:"'Noto Sans JP',sans-serif",
      color:"#fff", position:"relative", overflowX:"hidden",
      animation:"fadeIn .6s ease both" }}>

      {/* BG grid */}
      <div style={{ position:"fixed", inset:0, zIndex:0, pointerEvents:"none",
        backgroundImage:`linear-gradient(rgba(0,245,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,245,255,.03) 1px,transparent 1px)`,
        backgroundSize:"40px 40px" }} />
      {/* scan */}
      <div style={{ position:"fixed", left:0, right:0, height:2, zIndex:1, pointerEvents:"none",
        background:`linear-gradient(90deg,transparent,${theme.primary}2a,transparent)`,
        top:`${scan}%`, transition:"top .03s linear" }} />

      <div style={{ position:"relative", zIndex:2, maxWidth:680, margin:"0 auto", padding:"32px 20px 120px" }}>

        {/* 設定パネル オーバーレイ */}
        {settingOpen && (
          <div
            onClick={()=>setSettingOpen(false)}
            style={{ position:"fixed", inset:0, zIndex:8000, background:"#00000077" }}
          />
        )}

        {/* 設定パネル 本体（左からスライド） */}
        <div style={{
          position:"fixed", top:0, left:0, bottom:0, zIndex:8001,
          width:300, maxWidth:"85vw",
          background:"linear-gradient(160deg,#0d0d20,#080818)",
          borderRight:"1px solid #00f5ff33",
          boxShadow:"4px 0 40px #00000088",
          transform: settingOpen ? "translateX(0)" : "translateX(-100%)",
          transition:"transform .35s cubic-bezier(.22,1,.36,1)",
          display:"flex", flexDirection:"column",
          overflowY:"auto",
        }}>
          {/* パネルヘッダー */}
          <div style={{ padding:"24px 20px 16px", borderBottom:"1px solid #ffffff11", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
            <div style={{ fontFamily:"'Noto Sans JP',sans-serif", fontSize:13, color:"#00f5ff", letterSpacing:3 }}>SETTINGS</div>
            <button onClick={()=>setSettingOpen(false)} style={{ background:"none", border:"none", color:"#ffffff88", fontSize:22, cursor:"pointer", lineHeight:1 }}>✕</button>
          </div>

          <div style={{ padding:"20px 20px", display:"flex", flexDirection:"column", gap:24 }}>

            {/* ══ 表示 ══ */}
            <div style={{ fontFamily:"'Noto Sans JP',sans-serif", fontSize:13, color:theme.primary+"cc", letterSpacing:3, fontWeight:700 }}>▸ 表示</div>

            {/* テーマカラー */}
            <div>
              <div style={{ fontFamily:"'Noto Sans JP',sans-serif", fontSize:14, color:"#ffffffdd", fontWeight:700, marginBottom:10 }}>テーマカラー</div>
              <div style={{ display:"flex", flexWrap:"wrap", gap:8 }}>
                {Object.entries(THEMES).map(([key, t]) => (
                  <button key={key} onClick={() => setThemeKey(key)} style={{
                    padding:"7px 12px", borderRadius:20,
                    background: themeKey === key ? t.primary+"33" : "#ffffff0a",
                    border: `2px solid ${themeKey === key ? t.primary : "#ffffff22"}`,
                    color: themeKey === key ? t.primary : "#ffffff88",
                    fontSize:12, cursor:"pointer", transition:"all .2s",
                    fontFamily:"'Noto Sans JP',sans-serif",
                  }}>{t.name}</button>
                ))}
              </div>
            </div>

            <div style={{ height:1, background:"#ffffff11" }}/>

            {/* ══ 予測 ══ */}
            <div style={{ fontFamily:"'Noto Sans JP',sans-serif", fontSize:13, color:theme.primary+"cc", letterSpacing:3, fontWeight:700 }}>▸ 予測</div>

            {/* 複数予測 */}
            <div>
              <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:14 }}>
                <div>
                  <div style={{ fontFamily:"'Noto Sans JP',sans-serif", fontSize:14, color:"#ffffffdd", fontWeight:700 }}>複数の予測を生成</div>
                  <div style={{ fontSize:13, color:"#ffffffbb", marginTop:3 }}>一度に複数セット生成します</div>
                </div>
                <div onClick={()=>setMultiPredict(v=>!v)} style={{ width:52,height:28,borderRadius:14,cursor:"pointer",background:multiPredict?theme.primary:"#333",position:"relative",transition:"background .25s",flexShrink:0 }}>
                  <div style={{ position:"absolute",top:3,left:multiPredict?27:3,width:22,height:22,borderRadius:"50%",background:"#fff",transition:"left .25s",boxShadow:"0 1px 4px #00000066" }}/>
                </div>
              </div>
              <div style={{ opacity:multiPredict?1:0.3, pointerEvents:multiPredict?"auto":"none", transition:"opacity .25s" }}>
                <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:8 }}>
                  <span style={{ fontSize:13, color:"#ffffffcc" }}>生成セット数</span>
                  <span style={{ fontFamily:"'Noto Sans JP',sans-serif", fontSize:16, color:theme.primary, fontWeight:700 }}>{multiCount}</span>
                </div>
                <input type="range" min="2" max="10" value={multiCount} onChange={e=>setMultiCount(Number(e.target.value))}
                  style={{ width:"100%", accentColor:theme.primary, cursor:multiPredict?"pointer":"not-allowed" }}/>
                <div style={{ display:"flex", justifyContent:"space-between", fontSize:12, color:"#ffffffaa", marginTop:4 }}>
                  <span>2</span><span>10</span>
                </div>
              </div>
            </div>

            {/* HOT/COLDバイアス */}
            <div>
              <div style={{ fontFamily:"'Noto Sans JP',sans-serif", fontSize:14, color:"#ffffffdd", fontWeight:700, marginBottom:4 }}>予測の偏り</div>
              <div style={{ fontSize:13, color:"#ffffffbb", marginBottom:10 }}>HOT寄り〜バランス〜COLD寄り</div>
              <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:8 }}>
                <span style={{ fontSize:12, color:"#8338eccc" }}>❄️ COLD</span>
                <span style={{ fontFamily:"'Noto Sans JP',sans-serif", fontSize:14, color: hotBias > 0 ? "#ff006e" : hotBias < 0 ? "#8338ec" : "#ffffffcc", fontWeight:700 }}>
                  {hotBias > 0 ? `HOT +${hotBias}` : hotBias < 0 ? `COLD ${hotBias}` : "バランス"}
                </span>
                <span style={{ fontSize:12, color:"#ff006ecc" }}>🔥 HOT</span>
              </div>
              <input type="range" min="-5" max="5" value={hotBias} onChange={e=>setHotBias(Number(e.target.value))}
                style={{ width:"100%", accentColor: hotBias > 0 ? "#ff006e" : hotBias < 0 ? "#8338ec" : "#ffffff", cursor:"pointer" }}/>
              <div style={{ display:"flex", justifyContent:"space-between", fontSize:12, color:"#ffffffaa", marginTop:4 }}>
                <span>COLD寄り</span><span>バランス</span><span>HOT寄り</span>
              </div>
            </div>

            {/* 直近重視モード */}
            <div>
              <div style={{ fontFamily:"'Noto Sans JP',sans-serif", fontSize:14, color:"#ffffffdd", fontWeight:700, marginBottom:4 }}>予測の参照期間</div>
              <div style={{ fontSize:13, color:"#ffffffbb", marginBottom:10 }}>直近のデータを重視します</div>
              <div style={{ display:"flex", gap:8 }}>
                {[["all","全期間"],["100","直近100回"],["50","直近50回"]].map(([v,label])=>(
                  <button key={v} onClick={()=>setRecentMode(v)} style={{
                    flex:1, padding:"9px 4px",
                    background: recentMode===v ? theme.primary+"33" : "#ffffff0a",
                    border:`2px solid ${recentMode===v ? theme.primary : "#ffffff22"}`,
                    borderRadius:10, color: recentMode===v ? theme.primary : "#ffffff88",
                    fontSize:11, cursor:"pointer", transition:"all .2s",
                    fontFamily:"'Noto Sans JP',sans-serif",
                  }}>{label}</button>
                ))}
              </div>
            </div>

            <div style={{ height:1, background:"#ffffff11" }}/>

            {/* ══ 分析 ══ */}
            <div style={{ fontFamily:"'Noto Sans JP',sans-serif", fontSize:13, color:theme.primary+"cc", letterSpacing:3, fontWeight:700 }}>▸ 分析</div>

            {/* 分析期間 */}
            <div>
              <div style={{ fontFamily:"'Noto Sans JP',sans-serif", fontSize:14, color:"#ffffffdd", fontWeight:700, marginBottom:4 }}>頻度グラフの期間</div>
              <div style={{ fontSize:13, color:"#ffffffbb", marginBottom:10 }}>分析タブの集計対象を変更します</div>
              <div style={{ display:"flex", gap:8 }}>
                {[["all","全期間"],["100","直近100回"],["50","直近50回"]].map(([v,label])=>(
                  <button key={v} onClick={()=>setAnalysisPeriod(v)} style={{
                    flex:1, padding:"9px 4px",
                    background: analysisPeriod===v ? theme.secondary+"33" : "#ffffff0a",
                    border:`2px solid ${analysisPeriod===v ? theme.secondary : "#ffffff22"}`,
                    borderRadius:10, color: analysisPeriod===v ? theme.secondary : "#ffffff88",
                    fontSize:11, cursor:"pointer", transition:"all .2s",
                    fontFamily:"'Noto Sans JP',sans-serif",
                  }}>{label}</button>
                ))}
              </div>
            </div>

            <div style={{ height:1, background:"#ffffff11" }}/>

            {/* ══ その他 ══ */}
            <div style={{ fontFamily:"'Noto Sans JP',sans-serif", fontSize:13, color:theme.primary+"cc", letterSpacing:3, fontWeight:700 }}>▸ その他</div>

            {/* オープニングスキップ */}
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
              <div>
                <div style={{ fontFamily:"'Noto Sans JP',sans-serif", fontSize:14, color:"#ffffffdd", fontWeight:700 }}>オープニングをスキップ</div>
                <div style={{ fontSize:11, color:"#ffffffbb", marginTop:3, whiteSpace:"nowrap" }}>次回起動時に直接アプリを開く</div>              </div>
              <div onClick={()=>{
                const next = !JSON.parse(localStorage.getItem("loto7_skipOpening") ?? "false");
                localStorage.setItem("loto7_skipOpening", JSON.stringify(next));
                setSkipOpening(next);
              }} style={{ width:52,height:28,borderRadius:14,cursor:"pointer",background:skipOpening?theme.primary:"#333",position:"relative",transition:"background .25s",flexShrink:0 }}>
                <div style={{ position:"absolute",top:3,left:skipOpening?27:3,width:22,height:22,borderRadius:"50%",background:"#fff",transition:"left .25s",boxShadow:"0 1px 4px #00000066" }}/>
              </div>
            </div>

            {/* 履歴保存件数 */}
            <div>
              <div style={{ fontFamily:"'Noto Sans JP',sans-serif", fontSize:14, color:"#ffffffdd", fontWeight:700, marginBottom:4 }}>予測履歴の保存件数</div>
              <div style={{ fontSize:13, color:"#ffffffbb", marginBottom:10 }}>生成した予測を何件まで保存するか</div>
              <div style={{ display:"flex", gap:8 }}>
                {[[5,"5件"],[10,"10件"],[20,"20件"]].map(([v,label])=>(
                  <button key={v} onClick={()=>setHistoryLimit(v)} style={{
                    flex:1, padding:"9px 4px",
                    background: historyLimit===v ? theme.primary+"33" : "#ffffff0a",
                    border:`2px solid ${historyLimit===v ? theme.primary : "#ffffff22"}`,
                    borderRadius:10, color: historyLimit===v ? theme.primary : "#ffffff88",
                    fontSize:13, cursor:"pointer", transition:"all .2s",
                    fontFamily:"'Noto Sans JP',sans-serif",
                  }}>{label}</button>
                ))}
              </div>
            </div>

            {/* 入力補助モード */}
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
              <div>
                <div style={{ fontFamily:"'Noto Sans JP',sans-serif", fontSize:14, color:"#ffffffdd", fontWeight:700 }}>入力補助モード</div>
                <div style={{ fontSize:13, color:"#ffffffbb", marginTop:3 }}>予測後に補助ボタンを表示</div>
              </div>
              <div onClick={()=>setAssistEnabled(v=>!v)} style={{ width:52,height:28,borderRadius:14,cursor:"pointer",background:assistEnabled?theme.primary:"#333",position:"relative",transition:"background .25s",flexShrink:0 }}>
                <div style={{ position:"absolute",top:3,left:assistEnabled?27:3,width:22,height:22,borderRadius:"50%",background:"#fff",transition:"left .25s",boxShadow:"0 1px 4px #00000066" }}/>
              </div>
            </div>

            {/* 手動データベース追加 */}
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
              <div>
                <div style={{ fontFamily:"'Noto Sans JP',sans-serif", fontSize:14, color:"#ffffffdd", fontWeight:700 }}>手動データベース追加</div>
                <div style={{ fontSize:13, color:"#ffffffbb", marginTop:3 }}>履歴タブの手動入力フォームを表示</div>
              </div>
              <div onClick={()=>setManualDbEnabled(v=>!v)} style={{ width:52,height:28,borderRadius:14,cursor:"pointer",background:manualDbEnabled?theme.primary:"#333",position:"relative",transition:"background .25s",flexShrink:0 }}>
                <div style={{ position:"absolute",top:3,left:manualDbEnabled?27:3,width:22,height:22,borderRadius:"50%",background:"#fff",transition:"left .25s",boxShadow:"0 1px 4px #00000066" }}/>
              </div>
            </div>

          </div>

          {/* ヘルプボタン */}
          <div style={{ padding:"0 20px 4px" }}>
            <button onClick={()=>{ setSettingOpen(false); setHelpOpen(true); }} style={{
              width:"100%", padding:"14px 0",
              background:"linear-gradient(135deg,#ffffff11,#ffffff18)",
              border:"1px solid #ffffff33",
              borderRadius:12, color:"#ffffffee",
              fontFamily:"'Noto Sans JP',sans-serif", fontSize:15, fontWeight:700,
              cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", gap:10,
              transition:"all .2s",
            }}>
              <span style={{
                display:"inline-flex", alignItems:"center", justifyContent:"center",
                width:24, height:24, borderRadius:"50%",
                background:"#8338ec",
                border:"2px solid #1a1a2e",
                color:"#ffffff",
                fontWeight:900, fontSize:14, lineHeight:1, flexShrink:0,
              }}>?</span>
              ヘルプ・使い方
            </button>
          </div>

          {/* バージョン */}
          <div style={{ marginTop:"auto", padding:"16px 20px", borderTop:"1px solid #ffffff0a", fontSize:12, color:"#ffffff66", fontFamily:"'Noto Sans JP',sans-serif", letterSpacing:2 }}>
            LOTO 7 PREDICTOR v2.0
          </div>
        </div>

        {/* ── ヘルプ画面 ── */}
        {helpOpen && (
          <div ref={helpRef} style={{
            position:"fixed", inset:0, zIndex:9500,
            background:"#ffffff",
            overflowY:"auto",
            animation:"fadeIn .3s ease both",
          }}>
            {/* ヘルプヘッダー */}
            <div style={{
              position:"sticky", top:0, zIndex:1,
              background:"#ffffff",
              borderBottom:"2px solid #e8e8e8",
              padding:"16px 20px",
              display:"flex", alignItems:"center", justifyContent:"space-between",
            }}>
              <div>
                <div style={{ fontSize:10, color:"#999", letterSpacing:3, fontFamily:"'Noto Sans JP',sans-serif" }}>HELP</div>
                <div style={{ fontSize:18, fontWeight:700, color:"#1a1a2e" }}>使い方ガイド</div>
              </div>
              <button onClick={()=>setHelpOpen(false)} style={{
                background:"none", border:"none", fontSize:24, color:"#666", cursor:"pointer", lineHeight:1,
              }}>✕</button>
            </div>

            <div ref={helpContentRef} style={{ padding:"16px 20px 60px", maxWidth:600, margin:"0 auto" }}>

              {/* アプリ概要 */}
              <HelpSection icon="🎰" title="このアプリについて" color="#1a3a8f">
                <div style={{ fontSize:16, color:"#555", lineHeight:1.8, marginBottom:8 }}>ロト7の過去当選番号（第468〜674回以降）の統計データをもとに、番号を予測するエンターテインメントアプリです。</div>
                <HelpNote>ロト7は完全ランダム抽選のため、当選を保証するものではありません。宝くじはロマンの範囲でお楽しみください 🍀</HelpNote>
              </HelpSection>

              {/* 予測生成タブ */}
              <HelpSection icon="🎯" title="予測生成タブ" color="#00b8d4">
                <HelpItem label="最新回の表示">
                  画面上部に直近の当選番号を表示しています。参考にしながら予測を楽しんでください。
                </HelpItem>
                <HelpItem label="予測を生成">
                  「🎯 予測を生成」ボタンを押すと、スロット演出の後に予測番号が表示されます。過去データの出現頻度を重み付けした統計的予測です。
                </HelpItem>
                <HelpItem label="積み上げ表示">
                  複数セット生成した場合、1セットずつスロット演出の後に下へ積み上がっていきます。
                </HelpItem>
                <HelpItem label="📱 入力補助モード">
                  生成後に表示されるボタンをタップすると、番号が大きく表示されます。公式サイトとAndroidの分割画面で並べて使うと入力しやすくなります。
                </HelpItem>
                <HelpNote>分割画面の使い方：最近使ったアプリ（■）→ このアプリのサムネイルをタップ →「分割画面」を選択 → 下半分に公式サイトを表示</HelpNote>
              </HelpSection>

              {/* 履歴タブ */}
              <HelpSection icon="📋" title="履歴タブ" color="#7b2d8b">
                <HelpItem label="予測履歴">
                  このセッション中に生成した予測番号が保存されます。保存件数は設定で5・10・20件から選べます。
                </HelpItem>
                <HelpItem label="過去の当選番号">
                  実際の過去当選番号（最新10回分）を確認できます。
                </HelpItem>
                <HelpItem label="➕ 手動データ追加">
                  回号・日付・本数字7つを入力して「データベースに追加」を押すと、分析・予測に即反映されます。更新タブの自動取得が使えない場合の代替手段です。
                </HelpItem>
              </HelpSection>

              {/* 分析タブ */}
              <HelpSection icon="📊" title="分析タブ" color="#e65100">
                <HelpItem label="🔥 HOT NUMBERS">
                  集計期間中に最も多く出現した番号TOP7です。出現頻度が高い番号を重視した予測をしたい場合の参考にどうぞ。
                </HelpItem>
                <HelpItem label="❄️ COLD NUMBERS">
                  集計期間中に最も少ししか出ていない番号TOP7です。「そろそろ出るかも」という視点の参考に。
                </HelpItem>
                <HelpItem label="🔗 よく一緒に出る番号">
                  過去データで同時に出現した回数が多いペアTOP10です。組み合わせの参考にどうぞ。
                </HelpItem>
                <HelpItem label="FREQUENCY CHART">
                  1〜37の全番号の出現頻度をバーグラフで表示します。予測番号はグラフ上でハイライトされます。
                </HelpItem>
                <HelpNote>分析期間は設定で「全期間・直近100回・直近50回」から変更できます。</HelpNote>
              </HelpSection>

              {/* 更新タブ */}
              <HelpSection icon="🔄" title="更新タブ" color="#00796b">
                <HelpItem label="🔄 最新データを自動取得">
                  毎週金曜の抽選後（19時以降）にタップすると、ウェブ検索で最新の当選番号を自動取得します。取得後に内容を確認して「データベースに追加」を押してください。
                </HelpItem>
                <HelpItem label="レート制限(429)が出た場合">
                  自動で最大3回リトライします（30秒・60秒・90秒待機）。それでも失敗する場合は3〜5分後に再試行してください。
                </HelpItem>
                <HelpNote>取得したデータはアプリを閉じても保存されます。次回起動時も引き継がれます。</HelpNote>
              </HelpSection>

              {/* 設定 */}
              <HelpSection icon="⚙️" title="設定" color="#37474f">
                <HelpItem label="テーマカラー">5種類のカラーテーマから選べます。設定は次回起動時も引き継がれます。</HelpItem>
                <HelpItem label="複数の予測を生成">オンにするとスライダーで2〜10セットを一度に生成できます。1セットずつスロット演出が流れます。</HelpItem>
                <HelpItem label="予測の偏り">HOT寄り（出現頻度が高い番号を優先）〜バランス〜COLD寄り（出現が少ない番号を優先）をスライダーで調整できます。</HelpItem>
                <HelpItem label="予測の参照期間">予測に使うデータ範囲を「全期間・直近100回・直近50回」から選択できます。</HelpItem>
                <HelpItem label="頻度グラフの期間">分析タブの集計対象期間を変更できます。</HelpItem>
                <HelpItem label="入力補助モード">オフにすると予測後の「📱 入力補助モード」ボタンが非表示になります。</HelpItem>
                <HelpItem label="手動データベース追加">オフにすると履歴タブの手動入力フォームが非表示になります。</HelpItem>
                <HelpItem label="オープニングをスキップ">オンにすると次回起動時にオープニング演出をスキップして直接アプリが開きます。</HelpItem>
                <HelpItem label="予測履歴の保存件数">5・10・20件から選択できます。</HelpItem>
              </HelpSection>

            </div>
          </div>
        )}

        {/* ヘッダー */}
        <div style={{ textAlign:"center", marginBottom:28, position:"relative", paddingTop:8 }}>
          {/* 設定ボタン（左上・少し下げる） */}
          <button onClick={()=>setSettingOpen(v=>!v)} style={{
            position:"absolute", top:28, left:0,
            background:"none", border:"none", cursor:"pointer",
            display:"flex", flexDirection:"column", gap:5, padding:6,
          }}>
            {[0,1,2].map(i=>(
              <div key={i} style={{ width:22, height:2.5, background:"#ffffffcc", borderRadius:2 }}/>
            ))}
          </button>

          <div style={{ fontFamily:"'Orbitron',monospace", fontSize:12, letterSpacing:8, color:theme.primary+"cc", marginBottom:4 }}>LOTTERY PREDICTOR</div>
          <div style={{ display:"flex", alignItems:"baseline", justifyContent:"center", gap:2, marginBottom:2 }}>
            <span style={{
              fontFamily:"'Noto Sans JP',sans-serif", fontWeight:900, fontSize:42,
              background:"linear-gradient(90deg,#00f5ff,#8338ec,#00f5ff)",
              backgroundSize:"200% auto",
              WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent",
              color:"#00f5ff",
              animation:"shimmer 8s linear infinite", letterSpacing:3,
            }}>LOTO</span>
            <span style={{
              fontFamily:"'Noto Sans JP',sans-serif", fontWeight:900, fontSize:56,
              background:"linear-gradient(180deg,#ffbe0b,#ff006e)",
              WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent",
              color:"#ff006e",
              textShadow:"none",
              letterSpacing:0, lineHeight:1,
              filter:"drop-shadow(0 0 8px #ff006e88)",
              animation:"shimmer 8s linear infinite",
            }}>7</span>
          </div>
          <p style={{ color:"#ffffffbb", fontSize:13, marginTop:6, letterSpacing:2 }}>AI駆動型当選番号予測システム</p>
        </div>

        {/* データステータス */}
        <div style={{ background:theme.primary+"11", border:`1px solid ${theme.primary}44`, borderRadius:10, padding:"12px 18px", marginBottom:20, display:"flex", alignItems:"center", gap:10, flexWrap:"wrap" }}>
          <span style={{ color:theme.primary }}>●</span>
          <span style={{ fontFamily:"'Noto Sans JP',sans-serif", fontSize:14, color:theme.primary+"ee" }}>
            実データ — <strong style={{color:theme.primary, fontFamily:"'Noto Sans JP',sans-serif"}}>{draws.length}回分</strong>
            <span style={{ fontFamily:"'Noto Sans JP',sans-serif" }}>（第{draws[draws.length-1].round}〜第{draws[0].round}回）</span>
          </span>
        </div>

        {/* タブ */}
        <div style={{ display:"flex", gap:4, marginBottom:28, background:"#0d0d18", borderRadius:12, padding:4, border:"1px solid #ffffff1a" }}>
          {["generate","history","analysis","update"].map((t,i)=>(
            <button key={t} className="tab-btn" onClick={()=>setTab(t)} style={{
              flex:1, padding:"11px 0",
              background:tab===t?`linear-gradient(135deg,${theme.primary}33,${theme.secondary}33)`:"transparent",
              border:tab===t?`1px solid ${theme.primary}aa`:"1px solid transparent",
              borderRadius:8, color:tab===t?theme.primary:"#ffffffcc",
              fontFamily:"'Noto Sans JP',sans-serif", fontSize:11, letterSpacing:0, cursor:"pointer", transition:"all .2s",
              fontWeight: tab===t ? 700 : 400,
            }}>{["予測生成","履歴","分析","更新"][i]}</button>
          ))}
        </div>

        {/* 予測生成 */}
        {tab==="generate" && <div>
          <div style={{ background:"#0d0d20", border:"1px solid #ffffff1a", borderRadius:14, padding:"14px 18px", marginBottom:20 }}>
            <div style={{ fontFamily:"'Noto Sans JP',sans-serif", fontSize:11, color:"#ffffffcc", letterSpacing:1, marginBottom:10 }}>
              最新 第{latest.round}回（{latest.date}）
            </div>
            <div style={{ display:"flex", gap:5, flexWrap:"nowrap" }}>
              {latest.numbers.map((n,i)=><Ball key={i} number={n} color={COLORS[i]} size={36} fs={11}/>)}
            </div>
          </div>
          <div style={{ background:`linear-gradient(135deg,${theme.bg},${theme.card})`, border:`1px solid ${theme.primary}33`, borderRadius:20, padding:"20px 16px", marginBottom: sets.length > 0 ? 12 : 24, textAlign:"center", boxShadow:`0 0 60px ${theme.primary}08,inset 0 0 40px ${theme.secondary}08` }}>
            <div style={{ fontFamily:"'Noto Sans JP',sans-serif", fontSize:14, letterSpacing:4, color:"#ffffffdd", marginBottom:16 }}>
              {generating
                ? `解析中... ${multiPredict ? `(${sets.length+1}/${multiCount})` : ""}`
                : sets.length > 0
                  ? multiPredict ? `予測完了 ${sets.length}セット` : "予測番号"
                  : "ボタンを押して予測"}
            </div>

            {/* スロット演出エリア：上段4個・下段3個 */}
            {numbers.length > 0 ? (
              <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:10 }}>
                <div style={{ display:"flex", gap:10, justifyContent:"center" }}>
                  {numbers.slice(0,4).map((n,i) => <Ball key={`${animKey}-${i}`} number={n} color={COLORS[i]} delay={i*.08} animate={!generating || multiPredict} size={72} fs={22}/>)}
                </div>
                <div style={{ display:"flex", gap:10, justifyContent:"center" }}>
                  {numbers.slice(4,7).map((n,i) => <Ball key={`${animKey}-${i+4}`} number={n} color={COLORS[i+4]} delay={(i+4)*.08} animate={!generating || multiPredict} size={72} fs={22}/>)}
                </div>
              </div>
            ) : (
              <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:10 }}>
                <div style={{ display:"flex", gap:10, justifyContent:"center" }}>
                  {Array.from({length:4}).map((_,i) => <div key={i} style={{ width:72,height:72,borderRadius:"50%",border:"2px dashed #ffffff22",background:"#ffffff06" }}/>)}
                </div>
                <div style={{ display:"flex", gap:10, justifyContent:"center" }}>
                  {Array.from({length:3}).map((_,i) => <div key={i} style={{ width:72,height:72,borderRadius:"50%",border:"2px dashed #ffffff22",background:"#ffffff06" }}/>)}
                </div>
              </div>
            )}
          </div>

          {/* ── 積み上げエリア ── */}
          {sets.length > 0 && (
            <div style={{ display:"flex", flexDirection:"column", gap:8, marginBottom:24 }}>
              {sets.map((s,si) => (
                <div key={s.id} style={{
                  background:theme.card,
                  border:`1px solid ${theme.primary}22`,
                  borderRadius:14, padding:"12px 16px",
                  display:"flex", alignItems:"flex-start", gap:0,
                  animation:"fadeSlideUp .4s cubic-bezier(.22,1,.36,1) both",
                }}>
                  <div style={{
                    fontFamily:"'Noto Sans JP',sans-serif", fontSize:11,
                    color:theme.primary+"aa", width:28, flexShrink:0, textAlign:"center", paddingTop:10,
                  }}>{si+1}</div>
                  <div style={{ display:"flex", gap:10, flexWrap:"wrap" }}>
                    {s.nums.map((n,i) => (
                      <div key={i} style={{
                        width:38, height:38, borderRadius:"50%",
                        background:`radial-gradient(circle at 35% 35%,${COLORS[i]}aa,${COLORS[i]}22)`,
                        border:`2px solid ${COLORS[i]}`,
                        display:"flex", alignItems:"center", justifyContent:"center",
                        fontFamily:"'Noto Sans JP',sans-serif", fontSize:12, fontWeight:400, color:"#fff",
                        boxShadow:`0 0 8px ${COLORS[i]}55`,
                      }}>
                        {String(n).padStart(2,"0")}
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          )}
          <button className="gen-btn" onClick={handleGenerate} disabled={generating} style={{
            width:"100%", padding:"18px 0", borderRadius:14,
            background:generating?`linear-gradient(135deg,#111,${theme.card})`:`linear-gradient(135deg,${theme.primary}22,${theme.secondary}33)`,
            border:`2px solid ${generating?"#444":theme.primary+"88"}`,
            color:generating?"#ffffff55":theme.primary,
            fontFamily:"'Noto Sans JP',sans-serif", fontSize:15, fontWeight:700, letterSpacing:4,
            cursor:generating?"not-allowed":"pointer", transition:"all .25s",
          }}>
            {generating
              ?<span style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
                <span style={{width:14,height:14,borderRadius:"50%",border:`2px solid ${theme.primary}33`,borderTopColor:theme.primary,display:"inline-block",animation:"spin .8s linear infinite"}}/>解析中...
               </span>
              :"🎯 予測を生成"}
          </button>

          {/* 入力補助モードボタン */}
          {numbers.length > 0 && !generating && assistEnabled && (
            <button onClick={() => setAssistMode(true)} style={{
              width:"100%", padding:"14px 0", borderRadius:14, marginTop:12,
              background:"linear-gradient(135deg,#ffbe0b22,#ff6b0033)",
              border:"2px solid #ffbe0b88",
              color:"#ffbe0b",
              fontFamily:"'Noto Sans JP',sans-serif", fontSize:13, fontWeight:700, letterSpacing:3,
              cursor:"pointer", transition:"all .25s",
            }}>
              📱 入力補助モード
            </button>
          )}

          <p style={{ textAlign:"center", color:"#ffffffaa", fontSize:11, marginTop:12, letterSpacing:1, lineHeight:1.8 }}>
            ※ 第{draws[draws.length-1].round}〜第{draws[0].round}回（{draws.length}回分）の実データに基づく統計的予測です。
          </p>

          {/* 入力補助オーバーレイ */}
          {assistMode && (
            <div style={{
              position:"fixed", inset:0, zIndex:9000,
              background:"#000000ee",
              display:"flex", flexDirection:"column",
              alignItems:"center", justifyContent:"center",
              padding:20, overflowY:"auto",
              animation:"fadeIn .3s ease both",
            }}>

              {/* ── 単数モード ── */}
              {!multiPredict && (
                <>
                  <div style={{ textAlign:"center", marginBottom:28 }}>
                    <div style={{ fontFamily:"'Noto Sans JP',sans-serif", fontSize:11, color:"#ffbe0baa", letterSpacing:4, marginBottom:8 }}>INPUT ASSIST MODE</div>
                    <div style={{ fontFamily:"'Noto Sans JP',sans-serif", fontSize:13, color:"#ffffffaa" }}>この番号を公式サイトで入力してください</div>
                  </div>
                  <div style={{ display:"flex", flexWrap:"wrap", gap:14, justifyContent:"center", marginBottom:32 }}>
                    {numbers.map((n,i) => (
                      <div key={i} style={{ width:88,height:88,borderRadius:"50%",background:`radial-gradient(circle at 35% 35%,${COLORS[i]}cc,${COLORS[i]}44)`,border:`3px solid ${COLORS[i]}`,boxShadow:`0 0 30px ${COLORS[i]}88`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",fontFamily:"'Noto Sans JP',sans-serif" }}>
                        <div style={{ fontSize:30,fontFamily:"'Noto Sans JP',sans-serif",fontWeight:900,color:"#fff",textShadow:`0 0 15px ${COLORS[i]}`,lineHeight:1 }}>{String(n).padStart(2,"0")}</div>
                        <div style={{ fontSize:10,color:`${COLORS[i]}cc`,marginTop:4 }}>{["1st","2nd","3rd","4th","5th","6th","7th"][i]}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{ background:"#0d0d20",border:"1px solid #ffbe0b44",borderRadius:16,padding:"18px 28px",marginBottom:28,textAlign:"center" }}>
                    <div style={{ fontFamily:"'Noto Sans JP',sans-serif",fontSize:11,color:"#ffbe0baa",letterSpacing:3,marginBottom:10 }}>本数字</div>
                    <div style={{ display:"flex",gap:14,justifyContent:"center",flexWrap:"wrap" }}>
                      {numbers.map((n,i) => <span key={i} style={{ fontFamily:"'Noto Sans JP',sans-serif",fontSize:28,fontWeight:900,color:COLORS[i],textShadow:`0 0 10px ${COLORS[i]}66` }}>{n}</span>)}
                    </div>
                  </div>
                </>
              )}

              {/* ── 複数モード ── */}
              {multiPredict && (
                <>
                  <div style={{ textAlign:"center", marginBottom:16 }}>
                    <div style={{ fontFamily:"'Noto Sans JP',sans-serif", fontSize:11, color:"#ffbe0baa", letterSpacing:4, marginBottom:6 }}>INPUT ASSIST MODE</div>
                    <div style={{ fontFamily:"'Noto Sans JP',sans-serif", fontSize:13, color:"#ffffffaa" }}>予測番号 {sets.length}セット</div>
                  </div>
                  <div style={{ width:"100%", maxWidth:480, display:"flex", flexDirection:"column", gap:10, marginBottom:24 }}>
                    {sets.map((s,si) => (
                      <div key={s.id} style={{ background:"#0d0d20", border:"1px solid #ffffff1a", borderRadius:14, padding:"12px 16px" }}>
                        <div style={{ fontFamily:"'Noto Sans JP',sans-serif", fontSize:10, color:"#ffbe0baa", letterSpacing:2, marginBottom:8 }}>SET {si+1}</div>
                        <div style={{ display:"flex", gap:8, justifyContent:"center", flexWrap:"wrap", marginBottom:8 }}>
                          {s.nums.map((n,i) => (
                            <div key={i} style={{ width:44,height:44,borderRadius:"50%",background:`radial-gradient(circle at 35% 35%,${COLORS[i]}cc,${COLORS[i]}33)`,border:`2px solid ${COLORS[i]}`,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Noto Sans JP',sans-serif",fontSize:14,fontWeight:900,color:"#fff",boxShadow:`0 0 10px ${COLORS[i]}66` }}>
                              {String(n).padStart(2,"0")}
                            </div>
                          ))}
                        </div>
                        <div style={{ display:"flex", gap:10, justifyContent:"center", flexWrap:"wrap" }}>
                          {s.nums.map((n,i) => <span key={i} style={{ fontFamily:"'Noto Sans JP',sans-serif",fontSize:18,fontWeight:900,color:COLORS[i] }}>{n}</span>)}
                        </div>
                      </div>
                    ))}
                  </div>
                </>
              )}

              {/* 閉じるボタン（共通） */}
              <button onClick={() => setAssistMode(false)} style={{
                padding:"14px 44px", borderRadius:14,
                background:"linear-gradient(135deg,#ff006e22,#ff006e44)",
                border:"2px solid #ff006e88", color:"#ff006e",
                fontFamily:"'Noto Sans JP',sans-serif", fontSize:13, fontWeight:700, letterSpacing:3, cursor:"pointer",
              }}>✕ 閉じる</button>
              <div style={{ marginTop:14, fontSize:12, color:"#ffffffaa", letterSpacing:1, textAlign:"center" }}>
                分割画面で公式サイトと並べて使うと便利です
              </div>
            </div>
          )}
        </div>}

        {/* 履歴 */}
        {tab==="history" && <div>
          <div style={{ fontFamily:"'Noto Sans JP',sans-serif", fontSize:13, letterSpacing:3, color:"#ffffffdd", marginBottom:16 }}>予測履歴 — {sets.length} SETS</div>
          {sets.length===0
            ?<div style={{ textAlign:"center", padding:40, color:"#ffffffaa", fontSize:15, border:"1px dashed #ffffff44", borderRadius:16, marginBottom:24 }}>まだ予測が生成されていません</div>
            :sets.map((s,si)=>(
              <div key={s.id} style={{ background:"#0d0d20", border:"1px solid #ffffff1a", borderRadius:14, padding:"16px 20px", marginBottom:10, display:"flex", alignItems:"center", gap:12, flexWrap:"wrap" }}>
                <span style={{ fontFamily:"'Noto Sans JP',sans-serif", fontSize:13, color:"#ffffffcc", width:28, flexShrink:0 }}>#{si+1}</span>
                {s.nums.map((n,i)=>(
                  <div key={i} style={{ width:40,height:40,borderRadius:"50%",background:`${COLORS[i]}33`,border:`2px solid ${COLORS[i]}aa`,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Noto Sans JP',sans-serif",fontSize:13,fontWeight:700,color:COLORS[i] }}>
                    {String(n).padStart(2,"0")}
                  </div>
                ))}
              </div>
            ))
          }

          {/* ── 手動データ追加フォーム ── */}
          {manualDbEnabled && (
          <div style={{ background:"linear-gradient(135deg,#0a1a0a,#0a0a18)", border:"1px solid #06d6a066", borderRadius:16, padding:"22px", marginBottom:20, marginTop:28 }}>
            <div style={{ fontFamily:"'Noto Sans JP',sans-serif", fontSize:13, color:"#06d6a0", letterSpacing:2, marginBottom:18 }}>
              ➕ 最新回を追加（毎週更新）
            </div>
            <div style={{ display:"flex", gap:8, marginBottom:12, flexWrap:"wrap" }}>
              <input type="number" placeholder="回号 例: 675" value={newRound} onChange={e=>setNewRound(e.target.value)}
                style={{ width:140, padding:"10px 12px", background:"#080818", border:"1px solid #ffffff33", borderRadius:8, color:"#fff", fontFamily:"'Noto Sans JP',sans-serif", fontSize:13, outline:"none" }} />
              <input type="text" placeholder="日付 例: 2026-05-01" value={newDate} onChange={e=>setNewDate(e.target.value)}
                style={{ width:160, padding:"10px 12px", background:"#080818", border:"1px solid #ffffff33", borderRadius:8, color:"#fff", fontFamily:"'Noto Sans JP',sans-serif", fontSize:13, outline:"none" }} />
            </div>
            <div style={{ fontSize:13, color:"#ffffffcc", marginBottom:10 }}>本数字 7つ（1〜37）</div>
            <div style={{ display:"flex", gap:6, marginBottom:16, flexWrap:"wrap" }}>
              {newNums.map((v,i)=>(
                <input key={i} type="number" min="1" max="37" placeholder={`${i+1}`} value={v}
                  onChange={e=>{ const a=[...newNums]; a[i]=e.target.value; setNewNums(a); }}
                  style={{ width:54, padding:"10px 6px", textAlign:"center", background:"#080818", border:`2px solid ${COLORS[i]}77`, borderRadius:8, color:COLORS[i], fontFamily:"'Noto Sans JP',sans-serif", fontSize:14, fontWeight:700, outline:"none" }} />
              ))}
            </div>
            <button onClick={handleAddDraw} style={{
              padding:"12px 28px", background:"linear-gradient(135deg,#06d6a022,#06d6a044)",
              border:"1px solid #06d6a088", borderRadius:10, color:"#06d6a0",
              fontFamily:"'Noto Sans JP',sans-serif", fontSize:13, fontWeight:700, letterSpacing:2, cursor:"pointer",
            }}>データベースに追加</button>
            {addMsg && <div style={{ marginTop:12, fontSize:13, color:"#06d6a0", fontWeight:700 }}>{addMsg}</div>}
            {addErr && <div style={{ marginTop:12, fontSize:13, color:"#ff006e", fontWeight:700 }}>{addErr}</div>}
          </div>
          )}

          {/* 過去の当選番号（動的） */}
          <div style={{ fontFamily:"'Noto Sans JP',sans-serif", fontSize:13, letterSpacing:3, color:"#ffffffdd", margin:"24px 0 14px" }}>
            過去の当選番号<br/>
            <span style={{ fontSize:11, color:"#ffffffaa", letterSpacing:1 }}>（実データ {draws.length}回分 最新10回）</span>
          </div>
          {draws.slice(0,10).map(d=>(
            <div key={d.round} style={{ background:"#0d0d20", border:"1px solid #ffffff11", borderRadius:12, padding:"12px 16px", marginBottom:8 }}>
              {/* 上段：回号・日付 */}
              <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:8 }}>
                <span style={{ fontFamily:"'Noto Sans JP',sans-serif", fontSize:12, color:"#00f5ffcc", flexShrink:0 }}>第{d.round}回</span>
                <span style={{ fontSize:12, color:"#ffffffaa" }}>{d.date}</span>
              </div>
              {/* 下段：当選番号 */}
              <div style={{ display:"flex", gap:6, flexWrap:"nowrap", overflowX:"auto" }}>
                {d.numbers.map((n,i)=>(
                  <div key={i} style={{ width:34,height:34,borderRadius:"50%",background:`${COLORS[i]}22`,border:`2px solid ${COLORS[i]}88`,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Noto Sans JP',sans-serif",fontSize:11,fontWeight:700,color:COLORS[i],flexShrink:0 }}>
                    {String(n).padStart(2,"0")}
                  </div>
                ))}
              </div>
            </div>
          ))}
        </div>}

        {/* 分析 */}
        {tab==="analysis" && <div>
          <div style={{ fontFamily:"'Noto Sans JP',sans-serif", fontSize:13, letterSpacing:2, color:"#ffffffdd", marginBottom:20, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>
            頻度分析（{analysisPeriod==="all"?`全${draws.length}回`:analysisPeriod==="100"?"直近100回":"直近50回"}）
          </div>
          <div style={{ background:"#0d0d20", border:"1px solid #ffffff0f", borderRadius:16, padding:"20px", marginBottom:16 }}>
            <div style={{ fontFamily:"'Noto Sans JP',sans-serif", fontSize:13, color:theme.primary, letterSpacing:2, marginBottom:14 }}>🔥 HOT NUMBERS（出現多い）</div>
            <div style={{ display:"flex", gap:10, flexWrap:"wrap" }}>
              {[...hotNums].sort((a,b)=>a-b).map((n,i)=>(
                <div key={n} style={{ width:48,height:48,borderRadius:"50%",background:`radial-gradient(circle at 35% 35%,${COLORS[i]}aa,${COLORS[i]}22)`,border:`2px solid ${COLORS[i]}`,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Noto Sans JP',sans-serif",fontSize:14,fontWeight:900,color:"#fff",boxShadow:`0 0 12px ${COLORS[i]}66` }}>
                  {String(n).padStart(2,"0")}
                </div>
              ))}
            </div>
            <div style={{ marginTop:12, fontSize:13, color:"#ffffffcc", lineHeight:2 }}>
              {[...hotNums].sort((a,b)=>a-b).map(n=>`${n}番(${freqAnalysis[n]}回)`).join(" ／ ")}
            </div>
          </div>
          <div style={{ background:"#0d0d20", border:"1px solid #ffffff0f", borderRadius:16, padding:"20px", marginBottom:16 }}>
            <div style={{ fontFamily:"'Noto Sans JP',sans-serif", fontSize:13, color:"#8338ec", letterSpacing:2, marginBottom:14 }}>❄️ COLD NUMBERS（出現少ない）</div>
            <div style={{ display:"flex", gap:10, flexWrap:"wrap" }}>
              {[...coldNums].sort((a,b)=>a-b).map((n,i)=>(
                <div key={n} style={{ width:48,height:48,borderRadius:"50%",background:"radial-gradient(circle at 35% 35%,#8338ec66,#8338ec11)",border:"2px solid #8338ec88",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Noto Sans JP',sans-serif",fontSize:14,fontWeight:900,color:"#fff" }}>
                  {String(n).padStart(2,"0")}
                </div>
              ))}
            </div>
            <div style={{ marginTop:12, fontSize:13, color:"#ffffffcc", lineHeight:2 }}>
              {[...coldNums].sort((a,b)=>a-b).map(n=>`${n}番(${freqAnalysis[n]}回)`).join(" ／ ")}
            </div>
          </div>

          {/* 連続出現ペアパターン */}
          <div style={{ background:"#0d0d20", border:"1px solid #ffffff0f", borderRadius:16, padding:"20px", marginBottom:16 }}>
            <div style={{ fontFamily:"'Noto Sans JP',sans-serif", fontSize:13, color:"#ffbe0b", letterSpacing:2, marginBottom:14 }}>🔗 よく一緒に出る番号（TOP10）</div>
            <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
              {topPairs.map((p, i) => (
                <div key={i} style={{ display:"flex", alignItems:"center", gap:10 }}>
                  <span style={{ fontFamily:"'Noto Sans JP',sans-serif", fontSize:10, color:"#ffffff55", width:20, flexShrink:0 }}>#{i+1}</span>
                  <div style={{ display:"flex", gap:6, alignItems:"center" }}>
                    {p.pair.map((n,j) => (
                      <div key={j} style={{ width:34,height:34,borderRadius:"50%",background:`${COLORS[j]}22`,border:`2px solid ${COLORS[j]}88`,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Noto Sans JP',sans-serif",fontSize:11,fontWeight:700,color:COLORS[j] }}>
                        {String(n).padStart(2,"0")}
                      </div>
                    ))}
                    <span style={{ fontSize:11, color:"#ffffffaa", marginLeft:4 }}>が</span>
                  </div>
                  {/* バー */}
                  <div style={{ flex:1, height:6, background:"#ffffff11", borderRadius:3, overflow:"hidden" }}>
                    <div style={{ width:`${(p.count/topPairs[0].count)*100}%`, height:"100%", background:"linear-gradient(90deg,#ffbe0b,#fb5607)", borderRadius:3 }}/>
                  </div>
                  <span style={{ fontFamily:"'Noto Sans JP',sans-serif", fontSize:11, color:"#ffbe0b", width:32, textAlign:"right" }}>{p.count}回</span>
                </div>
              ))}
            </div>
          </div>

          <div style={{ background:"#0d0d20", border:"1px solid #ffffff0f", borderRadius:16, padding:"20px" }}>
            <div style={{ fontFamily:"'Noto Sans JP',sans-serif", fontSize:13, color:"#fb5607", letterSpacing:2, marginBottom:14 }}>FREQUENCY CHART（1〜37）</div>
            {Array.from({length:TOTAL_NUMBERS},(_,i)=>i+1).map(n=>(
              <FreqBar key={n} num={n} value={freqAnalysis[n]||0} max={maxFreq} lit={numbers.includes(n)} themeColor={theme.primary}/>
            ))}
          </div>
        </div>}

        {/* ── 更新タブ ── */}
        {tab==="update" && <UpdateTab draws={draws} setDraws={setDraws} />}

      </div>
    </div>
  );
}

// ── 更新タブ コンポーネント ──────────────────────────────────────
function UpdateTab({ draws, setDraws }) {
  const [status, setStatus]         = useState("idle");
  const [msg, setMsg]               = useState("");
  const [fetched, setFetched]       = useState(null);
  const [retryCount, setRetryCount] = useState(0);
  const [countdown, setCountdown]   = useState(0);

  const latestRound = draws[0]?.round || 0;
  const MAX_RETRY = 3;
  const sleep = ms => new Promise(r => setTimeout(r, ms));

  async function callAPI() {
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyxCXtvRkq49vorwwyTX-cR9--teii8C1CcBZZTGXMJldPmdFxFvIEzvLEPIgk7PtES/exec";
    try {
      const res = await fetch(GAS_URL, { signal: AbortSignal.timeout(20000) });
      if (!res.ok) return { status: res.status, error: "取得失敗" };
      const data = await res.json();
      if (data.error) return { status: 500, error: data.error };
      // GASから返ってきたdrawsをlatestRoundでフィルタ
      const filtered = (data.draws || []).filter(d => d.round > latestRound);
      if (filtered.length === 0) return { status: 200, text: '{"draws":[]}' };
      return { status: 200, text: JSON.stringify({ draws: filtered }) };
    } catch(e) {
      return { status: 500, error: e.message };
    }
  }

  async function handleAutoFetch() {
    setStatus("fetching");
    setMsg("");
    setFetched(null);
    setRetryCount(0);

    // 429時の待機時間（秒）: 1回目30秒、2回目60秒、3回目90秒
    const WAIT_TIMES = [30, 60, 90];

    for (let attempt = 0; attempt <= MAX_RETRY; attempt++) {
      try {
        if (attempt > 0) {
          const waitSec = WAIT_TIMES[attempt - 1];
          setStatus("retrying");
          setRetryCount(attempt);
          for (let i = waitSec; i > 0; i--) {
            setCountdown(i);
            await sleep(1000);
          }
          setStatus("fetching");
          setMsg("");
        }

        const result = await callAPI();

        if (result.status === 429) {
          if (attempt < MAX_RETRY) {
            setMsg(`レート制限中 (${attempt+1}/${MAX_RETRY}) — 少し待ってリトライします`);
            continue;
          } else {
            setStatus("idle");
            setMsg("⚠ レート制限が続いています。3〜5分後に再度「自動取得」を押してください。");
            return;
          }
        }

        if (result.status === 500 || result.status !== 200) {
          setStatus("error");
          setMsg("⚠ 自動取得に失敗しました。履歴タブの手動入力フォームからデータを追加してください。");
          return;
        }

        const text = result.text || "";

        // JSON抽出：{"draws" を起点に {} の対応を数えて完全なJSONを取り出す
        let jsonStr = null;
        const start = text.indexOf('{"draws"');
        if (start !== -1) {
          let depth = 0;
          for (let i = start; i < text.length; i++) {
            if (text[i] === '{') depth++;
            else if (text[i] === '}') {
              depth--;
              if (depth === 0) { jsonStr = text.slice(start, i + 1); break; }
            }
          }
        }

        // マークダウンコードブロックからも抽出を試みる
        if (!jsonStr) {
          const mdMatch = text.match(/```(?:json)?\s*(\{[\s\S]*?"draws"[\s\S]*?\})\s*```/);
          if (mdMatch) jsonStr = mdMatch[1];
        }

        if (!jsonStr) throw new Error("レスポンスの解析に失敗しました");

        // クリーニング：制御文字・改行の正規化・末尾カンマ除去
        const cleaned = jsonStr
          .replace(/[\x00-\x1F\x7F]/g, " ")  // 制御文字をスペースに
          .replace(/,(\s*[\]}])/g, "$1")       // 末尾カンマ除去
          .replace(/\s+/g, " ")               // 連続スペース正規化
          .trim();

        let parsed;
        try {
          parsed = JSON.parse(cleaned);
        } catch(parseErr) {
          // それでも失敗したらevalで試みる（最終手段）
          throw new Error(`JSON解析エラー: ${parseErr.message}`);
        }
        const valid = (parsed.draws||[]).filter(d =>
          d.round && d.date && Array.isArray(d.numbers) &&
          d.numbers.length === 7 &&
          d.numbers.every(n => Number.isInteger(n) && n >= 1 && n <= 37) &&
          !draws.some(x => x.round === d.round)
        );

        if (valid.length === 0) {
          setStatus("done");
          setMsg(`第${latestRound}回が最新です。新しいデータはまだありません。`);
        } else {
          setFetched(valid[0]);
          setStatus("done");
          setMsg(`第${valid[0].round}回のデータを取得しました！`);
        }
        return;

      } catch(e) {
        if (attempt === MAX_RETRY) {
          setStatus("error");
          setMsg(e.message);
        }
      }
    }
  }

  function handleAdd() {
    if (!fetched) return;
    const newDraw = { ...fetched, numbers: [...fetched.numbers].sort((a,b)=>a-b) };
    setDraws(prev => [newDraw, ...prev].sort((a,b)=>b.round-a.round));
    setMsg(`✓ 第${fetched.round}回をデータベースに追加しました！`);
    setFetched(null);
  }

  const isBusy = status === "fetching" || status === "retrying";

  return (
    <div>
      <div style={{ fontFamily:"'Noto Sans JP',sans-serif", fontSize:11, letterSpacing:3, color:"#ffffffaa", marginBottom:20 }}>
        自動データ更新
      </div>

      <div style={{ background:"#0a0a18", border:"1px solid #ffffff0a", borderRadius:14, padding:"16px 20px", marginBottom:20 }}>
        <div style={{ fontSize:12, color:"#ffffff88", marginBottom:4 }}>現在のデータベース</div>
        <div style={{ fontFamily:"'Noto Sans JP',sans-serif", fontSize:14, color:"#00f5ff" }}>
          最新：第{latestRound}回 / 全{draws.length}回分
        </div>
      </div>

      <button onClick={handleAutoFetch} disabled={isBusy} style={{
        width:"100%", padding:"18px 0", borderRadius:14, marginBottom:16,
        background: isBusy ? "linear-gradient(135deg,#111,#1a1a2e)" : "linear-gradient(135deg,#00f5ff22,#06d6a033)",
        border:`2px solid ${isBusy?"#333":"#06d6a066"}`,
        color: isBusy?"#ffffff44":"#06d6a0",
        fontFamily:"'Noto Sans JP',sans-serif", fontSize:13, fontWeight:700, letterSpacing:3,
        cursor: isBusy?"not-allowed":"pointer", transition:"all .25s",
      }}>
        {status==="fetching" && (
          <span style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
            <span style={{width:14,height:14,borderRadius:"50%",border:"2px solid #06d6a033",borderTopColor:"#06d6a0",display:"inline-block",animation:"spin .8s linear infinite"}}/>
            最新データを取得中...
          </span>
        )}
        {status==="retrying" && (
          <span style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
            <span style={{width:14,height:14,borderRadius:"50%",border:"2px solid #ffbe0b33",borderTopColor:"#ffbe0b",display:"inline-block",animation:"spin .8s linear infinite"}}/>
            {countdown}秒後にリトライ... ({retryCount}/{MAX_RETRY})
          </span>
        )}
        {!isBusy && "🔄 最新データを自動取得"}
      </button>

      {status==="idle" && (
        <div style={{ background:"#0d0d18", border:"1px solid #ffbe0b22", borderRadius:12, padding:"12px 16px", marginBottom:16 }}>
          <div style={{ fontSize:12, color:"#ffbe0baa", marginBottom:4 }}>⚡ 429エラーが出た場合</div>
          <div style={{ fontSize:12, color:"#ffffff88", lineHeight:1.8 }}>
            自動で最大3回リトライします（10秒・20秒・30秒待機）。<br/>
            それでも失敗する場合は数分後に再試行してください。
          </div>
        </div>
      )}

      {msg && (
        <div style={{
          background: status==="error" ? "#1a0500" : fetched ? "#001a0d" : "#0a0a18",
          border:`1px solid ${status==="error"?"#ff006e55":fetched?"#06d6a055":"#ffffff11"}`,
          borderRadius:14, padding:"16px 20px", marginBottom:16,
        }}>
          <div style={{ fontSize:13, color: status==="error"?"#ff006e":fetched?"#06d6a0":"#ffffffaa", marginBottom: fetched?16:0 }}>
            {msg}
          </div>
          {fetched && (
            <>
              <div style={{ fontFamily:"'Noto Sans JP',sans-serif", fontSize:10, color:"#ffffffaa", letterSpacing:3, marginBottom:10 }}>
                第{fetched.round}回 — {fetched.date}
              </div>
              <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginBottom:16 }}>
                {[...fetched.numbers].sort((a,b)=>a-b).map((n,i)=>(
                  <div key={i} style={{ width:44,height:44,borderRadius:"50%",background:`${COLORS[i]}22`,border:`2px solid ${COLORS[i]}88`,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Noto Sans JP',sans-serif",fontSize:14,fontWeight:900,color:COLORS[i] }}>
                    {String(n).padStart(2,"0")}
                  </div>
                ))}
              </div>
              <button onClick={handleAdd} style={{
                padding:"12px 28px", background:"linear-gradient(135deg,#06d6a022,#06d6a044)",
                border:"1px solid #06d6a077", borderRadius:10, color:"#06d6a0",
                fontFamily:"'Noto Sans JP',sans-serif", fontSize:12, fontWeight:700,
                letterSpacing:2, cursor:"pointer",
              }}>✓ データベースに追加する</button>
            </>
          )}
        </div>
      )}

      <div style={{ background:"#0d0d20", border:"1px solid #ffbe0b33", borderRadius:14, padding:"18px 22px" }}>
        <div style={{ fontFamily:"'Noto Sans JP',sans-serif", fontSize:12, color:"#ffbe0b", letterSpacing:2, marginBottom:14 }}>💡 使い方</div>
        <div style={{ fontSize:13, color:"#ffffffdd", lineHeight:2.4 }}>
          <div>毎週<strong style={{color:"#ffbe0b"}}>金曜の抽選後（19時以降）</strong>に</div>
          <div>「🔄 最新データを自動取得」を押す</div>
          <div>確認後「データベースに追加」を押すと</div>
          <div>HOT/COLD分析・予測に即反映されます。</div>
        </div>
        <div style={{ marginTop:14, paddingTop:14, borderTop:"1px solid #ffffff11", fontSize:13, color:"#ffffffaa", lineHeight:2 }}>
          ※ 取得できない場合は<strong style={{color:"#ffffffcc"}}>履歴タブの手動入力フォーム</strong>をご利用ください。
        </div>
      </div>
    </div>
  );
}

// ── ルート ───────────────────────────────────────────────────────
function App() {
  const skipOpening = JSON.parse(localStorage.getItem("loto7_skipOpening") ?? "false");
  const [screen, setScreen] = useState(skipOpening ? "main" : "opening");

  return (
    <>
      <style>{GLOBAL_CSS}</style>
      {screen === "opening" && (
        <OpeningScreen
          onAgree={()   => setScreen("main")}
          onDecline={() => setScreen("closed")}
        />
      )}
      {screen === "main"   && <MainApp />}
      {screen === "closed" && <ClosedScreen />}
    </>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
